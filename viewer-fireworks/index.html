<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎆p5js花火大会</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BXVQXL0LFX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BXVQXL0LFX');
  </script>
</head>
<body>
  <div id="stage">
    <iframe id="slot-a" class="sketch-frame" sandbox="allow-scripts"></iframe>
    <iframe id="slot-b" class="sketch-frame" sandbox="allow-scripts"></iframe>

    <!-- メタデータオーバーレイ -->
    <div id="overlay">
      <div id="overlay-text">
        <div id="overlay-title"></div>
        <div id="overlay-author"></div>
      </div>
    </div>

    <!-- フレーム画像オーバーレイ -->
    <img id="frame-overlay" src="../assets/frame.png" alt="">

    <!-- 作品カウンター -->
    <div id="counter"></div>
  </div>

  <script>
    // 400x800 のステージを画面に収まるようスケール
    (function() {
      var stage = document.getElementById('stage');
      function fit() {
        var scaleX = window.innerWidth / 400;
        var scaleY = window.innerHeight / 800;
        var scale = Math.min(scaleX, scaleY);
        stage.style.transform = 'scale(' + scale + ')';
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>

  <script src="player.js"></script>
</body>
</html>
