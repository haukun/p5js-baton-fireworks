<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p5js花火大会 - 作品一覧（管理用）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }
    h1 {
      font-size: 1.4rem;
      color: #fff;
      margin-bottom: 8px;
    }
    .info {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }
    .list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .entry {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #2a2a40;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      text-decoration: none;
      color: #e0e0e0;
      transition: background 0.15s;
    }
    .entry:hover {
      background: #3a3a55;
    }
    .entry-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: #444;
    }
    .entry-icon.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #888;
    }
    .entry-text {
      min-width: 0;
    }
    .entry-title {
      font-weight: 600;
      color: #fff;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-author {
      font-size: 0.8rem;
      color: #aaa;
    }
    .entry-id {
      font-size: 0.7rem;
      color: #666;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>作品一覧（管理用）</h1>
  <p class="info">クリックで該当作品から再生されます。</p>
  <div id="list" class="list"></div>

  <script>
    (async function() {
      const resp = await fetch('../viewer-fireworks/entries.json');
      const entries = await resp.json();

      document.querySelector('.info').textContent =
        `全 ${entries.length} 作品 — クリックで該当作品から再生されます。`;

      const list = document.getElementById('list');

      for (const entry of entries) {
        const a = document.createElement('a');
        a.className = 'entry';
        a.href = `../viewer-fireworks/?start=${entry.id}`;

        // アイコン
        if (entry.icon) {
          const img = document.createElement('img');
          img.className = 'entry-icon';
          img.src = `../entries/${entry.id}/${entry.icon}`;
          img.alt = '';
          a.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.className = 'entry-icon placeholder';
          ph.textContent = '🎆';
          a.appendChild(ph);
        }

        // テキスト
        const text = document.createElement('div');
        text.className = 'entry-text';
        text.innerHTML = `
          <div class="entry-title">${escape(entry.title || '(無題)')}</div>
          <div class="entry-author">${escape(entry.author || '(不明)')}</div>
          <div class="entry-id">${escape(entry.id)}</div>
        `;
        a.appendChild(text);

        list.appendChild(a);
      }

      function escape(str) {
        const el = document.createElement('span');
        el.textContent = str;
        return el.innerHTML;
      }
    })();
  </script>
</body>
</html>
