name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build entries.json
        run: node scripts/build-entries.js

      - name: Prepare deploy directory
        run: |
          mkdir -p _site/viewer-fireworks
          cp -r viewer-fireworks/* _site/viewer-fireworks/
          cp -r entries _site/entries
          cp -r playground _site/playground
          cp -r admin _site/admin
          cp -r assets _site/assets
          mkdir -p _site/docs
          cp docs/guide.html _site/docs/guide.html
          cp docs/guide-en.html _site/docs/guide-en.html
          # ルートからviewer-fireworksにリダイレクト
          echo '<meta http-equiv="refresh" content="0;url=viewer-fireworks/">' > _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
