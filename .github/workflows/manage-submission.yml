name: Delete Submission

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  delete:
    runs-on: ubuntu-latest
    if: github.event.issue.title == '作品削除'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Identify user entry
        id: identify
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const crypto = require('crypto');
            const path = require('path');

            const issue = context.payload.issue;
            const authorHash = crypto.createHash('sha256').update(issue.user.login).digest('hex');

            const registryPath = path.join(process.cwd(), '.registry.json');
            const registry = fs.existsSync(registryPath)
              ? JSON.parse(fs.readFileSync(registryPath, 'utf-8'))
              : {};

            const entryName = registry[authorHash] || '';

            if (!entryName) {
              core.setOutput('has_entry', 'false');
            } else {
              core.setOutput('has_entry', 'true');
              core.setOutput('entry_name', entryName);
              core.setOutput('author_hash', authorHash);
            }

      - name: Report no entry found
        if: steps.identify.outputs.has_entry == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## ❌ エラー\n\nあなたの投稿が見つかりません。先に作品を投稿してください。\n\n---\n*このIssueは自動クローズされます。*'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Delete entry
        if: steps.identify.outputs.has_entry == 'true'
        run: |
          ENTRY_NAME="${{ steps.identify.outputs.entry_name }}"
          AUTHOR_HASH="${{ steps.identify.outputs.author_hash }}"

          rm -rf "entries/${ENTRY_NAME}"

          node -e "
            const fs = require('fs');
            const reg = JSON.parse(fs.readFileSync('.registry.json', 'utf-8'));
            delete reg['${AUTHOR_HASH}'];
            fs.writeFileSync('.registry.json', JSON.stringify(reg, null, 2) + '\n');
          "

      - name: Build entries.json
        if: steps.identify.outputs.has_entry == 'true'
        run: node scripts/build-entries.js

      - name: Commit and push
        if: steps.identify.outputs.has_entry == 'true'
        run: |
          ENTRY_NAME="${{ steps.identify.outputs.entry_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Delete entry: ${ENTRY_NAME} (via issue #${{ github.event.issue.number }})"
          git push

      - name: Prepare deploy directory
        if: steps.identify.outputs.has_entry == 'true'
        run: |
          mkdir -p _site
          cp -r viewer-fireworks/* _site/
          cp -r entries _site/entries

      - name: Upload Pages artifact
        if: steps.identify.outputs.has_entry == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: steps.identify.outputs.has_entry == 'true'
        uses: actions/deploy-pages@v4

      - name: Close issue with success
        if: steps.identify.outputs.has_entry == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## ✅ 削除完了\n\nあなたの作品は削除されました。再投稿したい場合は「作品を投稿する」から再度投稿できます。\n\n---\n*このIssueは自動クローズされます。*'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
