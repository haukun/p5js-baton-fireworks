name: "✏️ 作品を更新する / Update a Sketch"
description: "投稿済みの作品を新しいコードに差し替えます"
title: "作品更新"
labels: ["update"]
body:
  - type: textarea
    id: code
    attributes:
      label: "新しいコード / New Code"
      description: |
        差し替えたいP5.jsスケッチのコードを貼り付けてください。
        以前と同じルールが適用されます。
      render: javascript
      placeholder: |
        function setup() {
          // 初期化
        }

        function draw() {
          background(0);
          let progress = frameCount / 600;
          // あなたのアニメーション
        }
    validations:
      required: true
