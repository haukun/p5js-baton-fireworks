name: "🎆 作品を投稿する / Submit a Sketch"
description: "P5.jsスケッチを投稿してください / Submit your p5.js sketch"
title: "作品提出"
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ タイトル欄（上の「Add a title」）は変更しないでください。/ Do not change the title field above.

  - type: input
    id: title
    attributes:
      label: "作品タイトル / Title"
      description: "あなたの作品のタイトル / Title of your work"
      placeholder: "例 / e.g.: Neon Fireworks"
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: "作者名 / Author"
      description: "表示される名前（ハンドルネーム可） / Display name (nicknames OK)"
      placeholder: "例 / e.g.: Taro"
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: "コード / Code"
      description: |
        [Playground](https://haukun.github.io/p5js-baton-fireworks/playground/)で動作確認してから提出してください。また[禁止事項はこちら](https://haukun.github.io/p5js-baton-fireworks/docs/guide.html#prohibited)になります。
        Please test in the [Playground](https://haukun.github.io/p5js-baton-fireworks/playground/) before submitting. See [prohibited items](https://haukun.github.io/p5js-baton-fireworks/docs/guide-en.html#prohibited).
      render: javascript
      placeholder: |
        function setup() {
          // 初期化 / initialization
        }

        function draw() {
          background(0);
          // あなたのアニメーション / your animation
        }
    validations:
      required: true

  - type: textarea
    id: icon
    attributes:
      label: "アイコン画像 / Icon (optional)"
      description: |
        作品のアイコン画像をここにドラッグ＆ドロップまたはペーストしてください（任意）。
        PNG/JPG/GIF、200KB以下。ビューアで作品名の横に表示されます。
        アップロード後、入力欄の内容が `<img src="https://...">` のような文字列に自動で置き換われば成功です。
        Drag & drop or paste an icon image here (optional). PNG/JPG/GIF, max 200KB. Displayed next to your work title.
        After upload, the field will automatically change to something like `<img src="https://...">` — that means it worked.
      placeholder: "ここに画像をドラッグ＆ドロップ / Drag & drop image here"
    validations:
      required: false

  - type: checkboxes
    id: agreement
    attributes:
      label: "確認 / Confirmation"
      options:
        - label: "投稿したコードは本リポジトリ上で公開されます。編集や削除をしても履歴として残るため、個人情報などをコードに含めないようご注意ください。 / Submitted code will be published on this repository. History remains even after edits or deletion. Do not include personal information."
          required: true
        - label: "[投稿規約 (SUBMISSION_TERMS.md)](https://github.com/haukun/p5js-baton-fireworks/blob/main/SUBMISSION_TERMS.md) に同意します。 / I agree to the [Submission Terms](https://github.com/haukun/p5js-baton-fireworks/blob/main/SUBMISSION_TERMS.md)."
          required: true
