<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>P5 Continue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="stage">
    <div id="scroll-container">
      <!-- セクションA: 上帯 + Canvas + 下帯 -->
      <div class="bar bar-top"><div class="bar-inner"></div></div>
      <iframe id="slot-a" class="sketch-frame"></iframe>
      <div class="bar bar-bottom"><div class="bar-inner"></div></div>
      <!-- セクションB: 上帯 + Canvas + 下帯 -->
      <div class="bar bar-top"><div class="bar-inner"></div></div>
      <iframe id="slot-b" class="sketch-frame"></iframe>
      <div class="bar bar-bottom"><div class="bar-inner"></div></div>
    </div>

    <!-- メタデータオーバーレイ -->
    <div id="overlay">
      <div id="overlay-title"></div>
      <div id="overlay-author"></div>
    </div>

    <!-- 作品カウンター -->
    <div id="counter"></div>
  </div>

  <script src="player.js"></script>
</body>
</html>
